name: Update YouTube Videos

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update videos.json
        run: python scripts/update_youtube_videos.py

      - name: Commit and push changes
        run: |
          if git diff --quiet videos.json; then
            echo "No new videos to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git commit -m "chore: update YouTube videos"
          git push
